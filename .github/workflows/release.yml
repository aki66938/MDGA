name: Release

on:
  push:
    tags:
      - "v*.*.*.*"

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Node dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v0.0.1.0
          SEMVER="${TAG#v}"                  # 0.0.1.0
          TAURI_VER="${SEMVER%.*}"           # 0.0.1  (drop patch segment)
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "tauri_ver=$TAURI_VER" >> $GITHUB_OUTPUT

      - name: Patch tauri.conf.json version
        shell: bash
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.version.outputs.tauri_ver }}\"/" \
            apps/desktop/src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "MDGA ${{ github.ref_name }}"
          releaseBody: |
            ## MDGA ${{ github.ref_name }}

            Windows 桌面安装包，下载 `.msi`（推荐）或 `.exe` 安装即可。

            **使用前提**：在 Windows 系统环境变量中配置 `DEEPSEEK_API_KEY`。

            ---
            查看完整更新记录：[doc/history.md](https://github.com/aki66938/MDGA/blob/main/doc/history.md)
          releaseDraft: false
          prerelease: false
