name: Build & Test

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "crates/**"
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "crates/**"
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "package-lock.json"

jobs:
  build-check:
    name: Build & Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Node dependencies
        run: npm ci

      - name: Check frontend build
        run: npm run build --workspace=apps/desktop

      # 0.0.70 测试门:前端 vitest(含 widget 安全 wrapper 冒烟)——失败即挡合并,不再只「编译绿」。
      - name: Run frontend tests
        run: npm test

      - name: Check Rust compile
        run: cargo check --workspace

      # 0.0.70 测试门:全工作区 Rust 单测/集成测(沙箱/权限/续接不变量等)——失败即挡合并。
      - name: Run Rust tests
        run: cargo test --workspace

      # 0.0.70:clippy 暂作**信息性**(现有约 41 条 warning,待全仓清理后再升为 -D warnings 硬门),不阻断合并。
      - name: Clippy (informational)
        run: cargo clippy --workspace
        continue-on-error: true
